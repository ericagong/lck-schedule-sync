name: Publish ICS

on:
  workflow_dispatch: # 수동 실행
  schedule:
    # 매일 2회 — 시간은 cron이 UTC 기준이므로 KST에서 빼야 함
    - cron: '0 19 * * *' # KST 새벽 04:00 (UTC 19:00 전날)
    - cron: '0 14 * * *' # KST 저녁 23:00 (UTC 14:00)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full check (typecheck + lint + format + test)
        run: pnpm check

      # 실패 시: 워크플로가 그대로 실패 → GitHub Actions 자동 알림.
      # 기존 public/t1.ics는 갱신되지 않으므로 GitHub Pages는 마지막 성공본을
      # 계속 서빙 — 사용자 캘린더에는 기존 매치가 유지되고 신규 매치만 lag.
      - name: Generate t1.ics
        run: pnpm dev

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
